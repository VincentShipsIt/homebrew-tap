name: CI

# Validates the formulae/casks in this tap. The MacSweep formula moved here from
# the macsweep repo; this checks the release-critical invariants: the pinned
# sha256 matches the source tarball, and the formula loads correctly as a tap
# formula. The full build-from-source compile is intentionally NOT repeated here —
# it's already gated on every tag by the macsweep repo's release.yml (which builds
# the CLI + runs `macsweep version`) and on every push by its ci.yml.

on:
  push:
    paths:
      - "Formula/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macsweep-formula:
    name: MacSweep formula
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # The formula pins `url` + `sha256`. Download the exact tarball the url
      # points at and assert its checksum equals the pinned one — catching the
      # "bumped the url but forgot the sha256" mistake before anyone can
      # `brew install` a formula that wouldn't verify.
      - name: Validate formula sha256 matches its pinned tarball
        run: |
          set -euo pipefail
          formula="Formula/macsweep.rb"
          url=$(grep -m1 -E '^\s*url ' "$formula" | sed -E 's/.*"([^"]+)".*/\1/')
          pinned=$(grep -m1 -E '^\s*sha256 ' "$formula" | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Formula url:    $url"
          echo "Formula sha256: $pinned"
          curl -fsSL --connect-timeout 15 --max-time 180 --retry 3 "$url" -o /tmp/macsweep-src.tar.gz
          actual=$(shasum -a 256 /tmp/macsweep-src.tar.gz | awk '{print $1}')
          echo "Tarball sha256: $actual"
          if [ "$actual" != "$pinned" ]; then
            echo "::error::Formula sha256 ($pinned) does not match tarball ($actual). Update Formula/macsweep.rb."
            exit 1
          fi

      # Ruby syntax check — cheap guard against a malformed formula.
      - name: Formula syntax
        run: ruby -c Formula/macsweep.rb

      # Load the formula the way Homebrew does. `brew install`/`audit` reject a
      # formula referenced by a bare path ("requires formulae to be in a tap"), so
      # register this checkout as a local tap, then `brew readall` parses + loads
      # every formula in it and fails on any error — no install, no trust gate.
      - name: Load formula as a tap
        run: |
          set -euo pipefail
          TAP_DIR="$(brew --repository)/Library/Taps/vincentshipsit/homebrew-tap"
          mkdir -p "$(dirname "$TAP_DIR")"
          ln -sfn "$GITHUB_WORKSPACE" "$TAP_DIR"
          brew readall vincentshipsit/tap
